particle_filter_localization_node:
  ros__parameters:
    num_particles: 300
    random_seed: 42
    # Seed particles around an /initialpose (RViz "2D Pose Estimate"). These are
    # the 1-sigma spread of the initial-pose guess; used once per pose estimate.
    initial_pose_std_xy: 0.3       # metres
    initial_pose_std_theta: 0.17   # radians (~10 deg)
    likelihood_max_distance: 1.0
    scan_beam_step: 10
    # Beam endpoint measurement model (likelihood field). A particle's weight is
    # the PRODUCT over beams of z_hit * exp(-d^2 / 2*sigma_hit^2) + z_rand, where
    # d is the distance from the beam endpoint to the nearest obstacle. The
    # product (vs. an arithmetic mean) gives exponential separation between good
    # and bad particles, so the cloud converges far faster from an imperfect
    # initial pose. z_rand floors each beam so one stray reading cannot zero out
    # a particle. sigma_hit is the endpoint Gaussian width in metres.
    measurement_sigma_hit: 0.2
    measurement_z_hit: 0.95
    measurement_z_rand: 0.05
    motion_update_min_translation: 0.001
    motion_update_min_rotation: 0.001
    # AMCL-style measurement-update gate: only run the scan likelihood model and
    # resampling after the robot has moved this far since the last update. While
    # (near) static the cloud is held still and the estimate/TF are just
    # re-broadcast — prevents standing-still jitter. Defaults match AMCL.
    update_min_translation: 0.20   # metres
    update_min_rotation: 0.52      # radians (~pi/6)
    translation_noise_from_translation: 0.02
    translation_noise_base: 0.005
    rotation_noise_from_rotation: 0.05
    rotation_noise_from_translation: 0.01
    rotation_noise_base: 0.002
    # Minimum translation (m) for the heading-of-travel to be trusted in the
    # odometry motion model. Below this a move is treated as pure rotation, so
    # noisy odom during an in-place spin does not scatter the particle cloud.
    min_translation_for_heading: 0.01
    resample_xy_noise_std: 0.02
    resample_theta_noise_std: 0.03
    # Random-particle recovery (kidnapped-robot global relocalization). The
    # injected fraction is keyed off the best particle's match quality. With an
    # initial pose provided, "imperfect but tracking" sits around best=0.70-0.85,
    # so the thresholds are set so that range injects almost nothing and the
    # local cloud is allowed to converge. Heavy global scattering only kicks in
    # when the best score is genuinely low (truly lost). Was 0.99/0.90/0.80/0.70
    # with 0.0/0.10/0.30/0.50, which scattered 20-50% of particles every
    # resample during normal convergence and stalled it.
    recovery_score_high: 0.85
    recovery_score_medium: 0.70
    recovery_score_low: 0.55
    recovery_score_min: 0.40
    recovery_fraction_high: 0.0
    recovery_fraction_medium: 0.05
    recovery_fraction_low: 0.15
    recovery_fraction_min: 0.30
