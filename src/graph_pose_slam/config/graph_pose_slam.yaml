graph_pose_slam_node:
  ros__parameters:
    # Minimum motion since the last keyframe required to accept a new one.
    # Larger spacing → the fixed CSM grid quantization error (1 cm / 1°) becomes
    # a smaller fraction of the total motion → less accumulated zig-zag.
    # Tested in simulation: 0.40 m gave visibly smoother path than 0.10 m.
    min_translation_for_keyframe: 0.40   # metres — rotation-only keyframes are never created

    # Correlative scan matching — same likelihood field used for both sequential and loop closure.
    # Grid resolution is 0.05 m; values below that clamp to binary (on-wall=1.0, else=0.0).
    csm_likelihood_max_dist: 0.10        # metres — strict: point must be within 10 cm of a wall
    csm_search_xy_range: 0.20            # search ±20 cm around odom guess
    csm_search_xy_step: 0.01             # 1 cm steps → 40 candidates in x and y
    csm_search_theta_range: 0.3          # search ±~17 degrees
    csm_search_theta_step: 0.01          # ~1 degree steps → 16 candidates
    csm_beam_step: 5                     # use every 5th beam when scoring
    # With likelihood_max_dist=0.10 m the score range drops vs the old 0.50 m field.
    # 0.65 accepts solid matches while still rejecting genuinely bad alignments.
    csm_min_score: 0.65                 # score below this → fall back to odometry

    # Loop closure detection
    lc_search_radius: 2.0               # only check old nodes within this radius (metres)
    lc_min_skip: 5                      # skip this many recent sequential neighbors
    lc_csm_search_xy_range: 0.50        # wider than sequential — drift offsets the initial guess
    lc_csm_search_theta_range: 0.50     # ~29 degrees
    lc_min_score: 0.85                  # CSM score required to confirm a loop closure
