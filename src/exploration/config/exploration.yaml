/**:
  ros__parameters:
    map_topic: /map          # live occupancy grid to explore
    goal_topic: /goal_pose   # next exploration goal (PoseStamped, map frame)
    map_frame: map
    robot_frame: base_link
    planning_period_s: 1.0   # control-loop tick: check arrival/timeout, re-pick when idle
    free_threshold: 45       # occupancy 0..this = drivable free cell (unknown is -1)
                             # freshly ray-traced free cells sit ~35, so keep this
                             # above that but below occupied (~70)
    min_cluster_size: 5      # drop frontier clusters smaller than this many cells
    arrival_tolerance: 0.3   # within this distance of the goal counts as reached
    goal_timeout_s: 30.0     # give up on a goal (re-pick) after this many seconds
