fastslam_node:
  ros__parameters:
    num_particles: 30
    scan_beam_step: 10
    ray_occupied_threshold: 65
    ray_occupied_crossing_penalty: 2.0
    ray_penalty_max_per_beam: 6.0
    ray_endpoint_margin_cells: 2
    likelihood_max_distance: 0.5
    likelihood_sigma: 0.20

    translation_noise_from_translation: 0.03
    translation_noise_from_rotation: 0.005
    translation_noise_base: 0.003
    rotation_noise_from_rotation: 0.03
    rotation_noise_from_translation: 0.01
    rotation_noise_base: 0.003

    min_translation_for_update: 0.10
    min_rotation_for_update: 0.08
    resample_min_eff_ratio: 0.3

    free_space_reward_per_cell: 0.01
    traj_max_poses: 500

    consecutive_wins_to_switch: 3
    switch_weight_ratio: 2.0

    freed_cells_rebuild_threshold: 5
